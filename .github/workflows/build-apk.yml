name: Build Android APK

  "on":
    push:
      branches: [ main, master ]
      paths:
        - 'marble-flow-main/**'
    workflow_dispatch:

  jobs:
    build-apk:
      name: Build Debug APK
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '22'
            cache: 'npm'
            cache-dependency-path: marble-flow-main/package-lock.json

        - name: Install dependencies
          working-directory: marble-flow-main
          run: npm ci

        - name: Build web app
          working-directory: marble-flow-main
          run: npm run build

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '17'

        - name: Set up Android SDK
          uses: android-actions/setup-android@v3

        - name: Sync Capacitor
          working-directory: marble-flow-main
          run: npx cap sync android

        - name: Make gradlew executable
          working-directory: marble-flow-main/android
          run: chmod +x gradlew

        - name: Build debug APK
          working-directory: marble-flow-main/android
          run: ./gradlew assembleDebug --no-daemon

        - name: Rename APK
          run: |
            DATE=$(date +%Y-%m-%d)
            cp marble-flow-main/android/app/build/outputs/apk/debug/app-debug.apk balaji-tiles-inventory-${DATE}.apk

        - name: Zip APK
          run: |
            DATE=$(date +%Y-%m-%d)
            zip balaji-tiles-inventory-${DATE}.zip balaji-tiles-inventory-${DATE}.apk

        - name: Upload APK artifact
          uses: actions/upload-artifact@v4
          with:
            name: balaji-tiles-inventory-apk
            path: balaji-tiles-inventory-*.zip
            retention-days: 30
  